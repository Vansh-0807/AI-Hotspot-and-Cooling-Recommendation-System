services:
  db:
    image: postgres:16-alpine
    container_name: urban-heat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urban_heat
    ports:
      - "5432:5432"
    volumes:
      - urban_heat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urban_heat"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: urban-heat-api:latest
    container_name: urban-heat-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/urban_heat
      CORS_ORIGINS: http://localhost:8501,http://127.0.0.1:8501,http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s



  dashboard:
    image: nginx:alpine
    container_name: urban-heat-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./urban-heat-dashboard.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  urban_heat_pgdata:
